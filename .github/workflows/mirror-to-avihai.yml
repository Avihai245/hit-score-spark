name: Mirror to Avihai245

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push mirror to Avihai245/hit-score-spark
        run: |
          git config user.email "sync@viralize.ai"
          git config user.name "Viralize Sync"
          git remote add avihai "https://nolanpiercemusic-star:${{ secrets.SYNC_TO_AVIHAI_TOKEN }}@github.com/Avihai245/hit-score-spark.git"
          git push avihai HEAD:main --force
          echo "✅ Mirrored to Avihai245/hit-score-spark"
